apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: dualstack-udn-vm
  namespace: dualstack-demo
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        app: dualstack-udn-vm
    spec:
      domain:
        resources:
          requests:
            memory: 2Gi
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: primary-udn
              binding:
                name: l2bridge
      networks:
        - name: primary-udn
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/containerdisks/fedora:40
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              password: changeme
              chpasswd:
                expire: false
