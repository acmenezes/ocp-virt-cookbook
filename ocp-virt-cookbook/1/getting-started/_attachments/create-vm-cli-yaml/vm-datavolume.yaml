apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-datavolume
  namespace: demo
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm-datavolume
    spec:
      domain:
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
        resources:
          requests:
            memory: 2Gi
            cpu: 1
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: vm-datavolume
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              ssh_pwauth: true
              user:
                name: fedora
                lock_passwd: false
                plain_text_passwd: fedora123
                ssh_authorized_keys:
                  - 'ssh-ed25519 AAAA...your-public-key... user@workstation'
              packages:
                - vim
                - git
              runcmd:
                - echo "VM setup complete" > /tmp/vm-ready
  dataVolumeTemplates:
    - metadata:
        name: vm-datavolume
      spec:
        sourceRef:
          kind: DataSource
          name: fedora
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 30Gi