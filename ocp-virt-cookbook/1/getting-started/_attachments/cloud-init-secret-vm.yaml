---
# Secret containing cloud-init userData
apiVersion: v1
kind: Secret
metadata:
  name: my-vm-cloud-init
  namespace: demo
type: Opaque
stringData:
  userdata: |
    #cloud-config
    ssh_pwauth: true
    user:
      name: fedora
      lock_passwd: false
      plain_text_passwd: s3cur3p4ss
      ssh_authorized_keys:
        - 'ssh-ed25519 AAAA...PelXA89RIUOn/b'
    users:
      - name: userone
        lock_passwd: false
        plain_text_passwd: s3cur3p4ss
        ssh_authorized_keys:
          - 'ssh-ed25519 AAAA...PelXA89RIUOn/b'
    packages:
      - vim
      - git
    runcmd:
      - echo "Cloud-init complete" > /tmp/cloud-init-done
---
# VirtualMachine referencing the Secret for cloud-init data
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: fedora-cloud-init-secret-demo
  namespace: demo
  labels:
    app: fedora-cloud-init-secret-demo
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        app: fedora-cloud-init-secret-demo
    spec:
      domain:
        devices:
          disks:
            - disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - masquerade: {}
              name: default
        resources:
          requests:
            memory: 2Gi
      networks:
        - name: default
          pod: {}
      volumes:
        - dataVolume:
            name: fedora-cloud-init-secret-demo
          name: rootdisk
        - cloudInitNoCloud:
            secretRef:
              name: my-vm-cloud-init
          name: cloudinitdisk
  dataVolumeTemplates:
    - metadata:
        name: fedora-cloud-init-secret-demo
      spec:
        sourceRef:
          kind: DataSource
          name: fedora
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 30Gi
